[[plugins]]
repo = 'windwp/nvim-autopairs'
on_event = 'InsertEnter'
hooks_file = '$HOOKS_DIR/autopairs.lua'

[[plugins]]
repo = 'Shougo/deol.nvim'
on_event = 'TermOpen'
hooks_file = '$HOOKS_DIR/deol.lua'

[[plugins]]
repo = 'nvim-tree/nvim-web-devicons'
on_source = 'feline.nvim'

[[plugins]]
repo = 'rcarriga/nvim-notify'
rev = 'v3.15.0'
on_lua = 'notify'
hooks_file = '$HOOKS_DIR/nvim-notify.lua'

[[plugins]]
repo = 'lewis6991/gitsigns.nvim'
on_event = 'BufRead'
hooks_file = '$HOOKS_DIR/gitsigns.lua'

[[plugins]]
repo = 'ojroques/nvim-osc52'
hooks_file = '$HOOKS_DIR/osc52.lua'
on_event = 'TextYankPost'
